/* ================================================================
   GPS（現在地取得と自動チェック）
   ================================================================ */

function startGPS() {
  if (!navigator.geolocation) { setGpsStatus('非対応', 'error'); return; }
  setGpsStatus('取得中…', '');
  gpsWatchId = navigator.geolocation.watchPosition(
    onGpsSuccess, onGpsError,
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function onGpsSuccess(pos) {
  currentLat = pos.coords.latitude;
  currentLng = pos.coords.longitude;
  const acc  = Math.round(pos.coords.accuracy);

  setGpsStatus(`精度 ±${acc}m`, 'active');

  const ownColor = VEHICLE_COLORS[selectedColorIdx % VEHICLE_COLORS.length] || '#3182ce';
  if (!gpsMarker) {
    map.setView([currentLat, currentLng], 16);
    gpsMarker = L.circleMarker([currentLat, currentLng], {
      radius: 8, fillColor: ownColor, fillOpacity: 1, color: 'white', weight: 2,
    }).addTo(map).bindPopup(selectedVehicle || '現在地');
    gpsCircle = L.circle([currentLat, currentLng], {
      radius: 10, color: ownColor, fillColor: ownColor, fillOpacity: 0.15, weight: 2,
    }).addTo(map);
  } else {
    gpsMarker.setLatLng([currentLat, currentLng]);
    gpsMarker.setStyle({ fillColor: ownColor });
    gpsCircle.setLatLng([currentLat, currentLng]);
    gpsCircle.setStyle({ color: ownColor, fillColor: ownColor });
    gpsCircle.setRadius(10);
  }

  const last = trackPoints[trackPoints.length - 1];
  const movedEnough = !last ||
    getDistanceMeters(currentLat, currentLng, last.lat, last.lng) >= TRACK_MIN_DIST;
  if (movedEnough) {
    trackPoints.push({ lat: currentLat, lng: currentLng, ts: Date.now() });
    updateTrackPolyline();
    saveTrackToStorage();
  }

  if (currentMode !== 'collect') return;
  const now = Date.now();
  checkpoints.forEach(cp => {
    if (cp.checked) return;
    const folder = folders.find(f => f.id === cp.folderId);
    if (folder && folder.visible === false) return;

    const inRange = getDistanceMeters(currentLat, currentLng, cp.lat, cp.lng) <= 5;
    if (inRange) {
      if (!contactStartTimes[cp.id]) {
        contactStartTimes[cp.id] = now;
      } else if (now - contactStartTimes[cp.id] >= 5000) {
        checkPoint(cp.id, true);
        delete contactStartTimes[cp.id];
      }
    } else {
      delete contactStartTimes[cp.id];
    }
  });
}

function onGpsError(err) {
  const msgs = { 1: 'アクセス拒否', 2: '位置取得失敗', 3: 'タイムアウト' };
  setGpsStatus(msgs[err.code] || 'エラー', 'error');
}

function setGpsStatus(text, cls) {
  const el = document.getElementById('gps-status');
  el.textContent = 'GPS: ' + text;
  el.className   = cls || '';
  if (cls) el.classList.add(cls);
}


/* ================================================================
   走行軌跡の管理（端末ごとのローカル管理）
   ================================================================ */

// 自端末軌跡セグメント（停止検出付きレンダリング）
let ownTrackSegments  = [];
let ownStopMarkers    = [];

function updateTrackPolyline() {
  // 既存レイヤーをすべて削除
  ownTrackSegments.forEach(s => map.removeLayer(s));
  ownStopMarkers.forEach(s => map.removeLayer(s));
  ownTrackSegments = []; ownStopMarkers = [];

  if (trackPolyline) { map.removeLayer(trackPolyline); trackPolyline = null; }

  const pts  = trackPoints;
  const color = VEHICLE_COLORS[selectedColorIdx % VEHICLE_COLORS.length] || '#e53e3e';
  const baseOpacity = trackVisible ? 0.8 : 0;

  if (pts.length < 2) {
    document.getElementById('track-info').textContent = `軌跡: ${pts.length}pt`;
    return;
  }

  let segStart = 0;
  for (let i = 0; i < pts.length - 1; i++) {
    const gap    = pts[i + 1].ts - pts[i].ts;
    const isStop = gap >= STOP_DETECT_MS;
    const isLast = i === pts.length - 2;

    if (isStop || isLast) {
      const segPts = pts.slice(segStart, i + 2).map(p => [p.lat, p.lng]);
      if (segPts.length >= 2) {
        const poly = L.polyline(segPts, {
          color, weight: isStop ? 6 : 3,
          opacity: isStop ? Math.min(1, baseOpacity + 0.18) : baseOpacity,
          lineJoin: 'round',
        }).addTo(map);
        ownTrackSegments.push(poly);
      }
      if (isStop) {
        const sm = L.circleMarker([pts[i].lat, pts[i].lng], {
          radius: 5, fillColor: color, fillOpacity: trackVisible ? 0.75 : 0,
          color: 'white', weight: 1.5, opacity: trackVisible ? 1 : 0,
        }).addTo(map);
        ownStopMarkers.push(sm);
      }
      segStart = i + 1;
    }
  }

  document.getElementById('track-info').textContent = `軌跡: ${pts.length}pt`;
}

function toggleTrackVisibility() {
  trackVisible = !trackVisible;
  updateTrackPolyline();
  const btn = document.getElementById('btn-track-toggle');
  btn.textContent = trackVisible ? '表示中' : '非表示';
  btn.classList.toggle('hidden-track', !trackVisible);
}

function clearTrack() {
  if (!confirm('走行軌跡をクリアしますか？')) return;
  trackPoints = [];
  ownTrackSegments.forEach(s => map.removeLayer(s)); ownTrackSegments = [];
  ownStopMarkers.forEach(s => map.removeLayer(s));   ownStopMarkers   = [];
  if (trackPolyline) { map.removeLayer(trackPolyline); trackPolyline = null; }
  document.getElementById('track-info').textContent = '軌跡: 0pt';
  localStorage.removeItem('patrol_track');
}

function saveTrackToStorage() {
  const slim = trackPoints.map(p => [
    Math.round(p.lat * 1e5) / 1e5,
    Math.round(p.lng * 1e5) / 1e5,
    p.ts,
  ]);
  try { localStorage.setItem('patrol_track', JSON.stringify(slim)); } catch(e) {}
}

function loadTrackFromStorage() {
  const raw = localStorage.getItem('patrol_track');
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    trackPoints = data.map(p => ({ lat: p[0], lng: p[1], ts: p[2] }));
    if (trackPoints.length > 0) updateTrackPolyline();
  } catch(e) {}
}


/* ================================================================
   距離計算（ハーバーサイン公式）
   ================================================================ */

function getDistanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function toRad(deg) { return deg * Math.PI / 180; }


/* ================================================================
   トースト通知
   ================================================================ */

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}


/* ================================================================
   XSS対策
   ================================================================ */

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}


/* ================================================================
   初期設定の登録・復元（Firestore保存）
   ================================================================ */

async function saveAsDefault() {
  if (!confirm('現在のチェックポイント配置を初期設定として登録しますか？\n（チェック状態はリセットして保存されます）')) return;

  const cpSnap = checkpoints.map(({ id, name, lat, lng, folderId }) =>
    ({ id, name, lat, lng, folderId })
  );
  const folderSnap = folders.map(({ id, name, collapsed, visible }) =>
    ({ id, name, collapsed: collapsed || false, visible: visible !== false })
  );

  try {
    setSyncStatus('⏳ 保存中…', 'loading');
    await SHARED_DOC.set({
      defaultFolders:     folderSnap,
      defaultCheckpoints: cpSnap,
      defaultNextId:      nextId,
    }, { merge: true });
    setSyncStatus('✅ 同期済', 'ok');
    updateResetButton();
    showToast('⭐ 初期設定を登録しました');
  } catch(e) {
    setSyncStatus('❌ 保存失敗', 'error');
    showToast('❌ 初期設定の登録に失敗しました');
  }
}

async function resetToDefault() {
  if (!confirm('初期設定に戻しますか？\n現在の全チェック状態とポイント変更がリセットされます。')) return;

  try {
    const snap = await SHARED_DOC.get();
    if (!snap.exists || !snap.data().defaultCheckpoints) {
      showToast('⚠️ 初期設定が登録されていません'); return;
    }
    const data = snap.data();

    setSyncStatus('⏳ 保存中…', 'loading');
    await SHARED_DOC.set({
      folders:     data.defaultFolders,
      checkpoints: data.defaultCheckpoints,
      nextId:      data.defaultNextId,
      checkStates: {},
    }, { merge: true });

    localStorage.removeItem('patrol_check_states');
    setSyncStatus('✅ 同期済', 'ok');
    showToast('↩ 初期設定に戻しました');
  } catch(e) {
    setSyncStatus('❌ 保存失敗', 'error');
    showToast('❌ 初期設定への復元に失敗しました');
  }
}

async function updateResetButton() {
  const btn = document.getElementById('admin-btn-reset-default');
  if (!btn) return;
  try {
    const snap = await SHARED_DOC.get();
    btn.disabled = !snap.exists || !snap.data()?.defaultCheckpoints;
  } catch(e) {
    btn.disabled = true;
  }
}


/* ================================================================
   CSVエクスポート
   ================================================================ */

function exportCsv() {
  if (checkpoints.length === 0) { showToast('⚠️ エクスポートするデータがありません'); return; }

  const header = ['ID', 'フォルダ名', 'ポイント名', '緯度', '経度', 'チェック済', 'チェック日時'];
  const rows = checkpoints.map(cp => {
    const folderName = (folders.find(f => f.id === cp.folderId) || {}).name || '';
    return [
      cp.id, folderName, cp.name, cp.lat, cp.lng,
      cp.checked ? '済' : '未',
      cp.checkedAt || '',
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
  });

  const bom = '\uFEFF';
  const csv = bom + [header.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date().toLocaleString('ja-JP').replace(/[/:]/g, '-').replace(/\s/g, '_');
  a.href = url;
  a.download = `checkpoints_${now}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 CSVをダウンロードしました');
}


/* ================================================================
   CSVインポート
   列順: ID, フォルダ名, ポイント名, 緯度, 経度, チェック済, チェック日時
   ================================================================ */

function importCsv(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // 同じファイルを再選択できるようリセット

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result.replace(/^\uFEFF/, ''); // BOM除去
      const lines = text.split(/\r\n|\r|\n/).filter(l => l.trim());
      if (lines.length < 2) { showToast('⚠️ データが見つかりません'); return; }

      // ヘッダー行をスキップして各行をパース
      const rows = lines.slice(1).map(parseCsvLine).filter(r => r.length >= 5);

      if (rows.length === 0) { showToast('⚠️ 有効な行がありません'); return; }

      // フォルダ名 → フォルダIDのマッピング（完全一致 → 部分一致 → その他フォルダ）
      const fallbackFolder = folders[folders.length - 1];
      const resolveFolder = (name) => {
        const exact = folders.find(f => f.name === name);
        if (exact) return exact.id;
        const partial = folders.find(f => f.name.includes(name) || name.includes(f.name));
        if (partial) return partial.id;
        return fallbackFolder ? fallbackFolder.id : 1;
      };

      // インポート対象の確認サマリーを作成
      const preview = rows.slice(0, 5).map(r => `・${r[1]}／${r[2]}`).join('\n');
      const more = rows.length > 5 ? `\n… 他${rows.length - 5}件` : '';
      if (!confirm(
        `${rows.length}件のチェックポイントをインポートします。\n\n` +
        `${preview}${more}\n\n` +
        `既存のチェックポイントは残したまま追加されます。\n続行しますか？`
      )) return;

      // チェックポイントを追加（IDは新規採番、チェック状態は無視）
      rows.forEach(r => {
        const folderName = r[1];
        const name       = r[2];
        const lat        = parseFloat(r[3]);
        const lng        = parseFloat(r[4]);

        if (!name || isNaN(lat) || isNaN(lng)) return; // 不正行はスキップ

        const folderId = resolveFolder(folderName);
        const id = nextId++;
        const marker = L.marker([lat, lng], { icon: makeIcon(false) })
          .addTo(map)
          .bindPopup(`<b>${escHtml(name)}</b><br><small>${lat.toFixed(5)}, ${lng.toFixed(5)}</small>`);
        marker.on('click', function() { this.openPopup(); });
        const circle = L.circle([lat, lng], {
          radius: 5, color: '#3182ce', fillColor: '#3182ce', fillOpacity: 0.08, weight: 1.5,
        }).addTo(map);
        checkpoints.push({ id, name, lat, lng, folderId, checked: false, checkedAt: null, marker, circle });
      });

      renderList();
      renderReport();
      saveSharedData();
      showToast(`✅ ${rows.length}件をインポートしました`);
    } catch(err) {
      console.error('CSVインポートエラー:', err);
      showToast('❌ CSVの読み込みに失敗しました');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// CSVの1行をフィールド配列に分解（ダブルクォート対応）
function parseCsvLine(line) {
  const fields = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuote) {
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuote = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQuote = true; }
      else if (ch === ',') { fields.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  fields.push(cur);
  return fields;
}

   アプリ起動処理
   ================================================================ */

// 1. チェックポイント同期開始（最初のスナップショット後に車両選択を表示）
startFirestoreListenerThenVehicleSelect();
// 2. ローカル軌跡読み込み
loadTrackFromStorage();
// 3. 他端末リアルタイム表示
startDevicesListener();
// 4. GPS開始
startGPS();
// 5. 初期設定ボタン更新
updateResetButton();

function startFirestoreListenerThenVehicleSelect() {
  setSyncStatus('⏳ 接続中…', 'loading');
  let firstSnapshot = true;
  SHARED_DOC.onSnapshot(
    doc => {
      if (!doc.exists) {
        loadFromLocalStorage();
        setSyncStatus('✅ 同期済', 'ok');
      } else {
        applySharedData(doc.data());
        setSyncStatus('✅ 同期済', 'ok');
      }
      if (firstSnapshot) {
        firstSnapshot = false;
        showVehicleSelect();           // フォルダ読み込み後に車両選択
        if (selectedVehicle) startGpsDeviceWrite();
      }
    },
    err => {
      console.error('Firestoreリスナーエラー:', err);
      setSyncStatus('❌ 接続失敗', 'error');
      showToast('❌ クラウド接続に失敗。ローカルデータを使用します。');
      loadFromLocalStorage();
      showVehicleSelect();
      if (selectedVehicle) startGpsDeviceWrite();
    }
  );
}

</script>
